services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - rabbitmq
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A tasks.nudges.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - rabbitmq
    volumes:
      - .:/app

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A tasks.nudges.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - rabbitmq
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma:/chroma/chroma

volumes:
  chroma:
